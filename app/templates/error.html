{% extends "base.html" %}

{% block content %}
<section class="py-20">
  <div class="max-w-4xl mx-auto px-4 text-center">
    <h1 class="text-6xl font-bold text-slate-300 mb-4">{{ status_code }}</h1>
    <p class="text-xl text-slate-700 mb-8">{{ detail|default('Something went wrong.') }}</p>
    <a href="/" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg px-6 py-3">
      Go back home
    </a>
  </div>
</section>
{% endblock %}
