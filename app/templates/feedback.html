{% extends "base.html" %}

{% block content %}
<section class="bg-white border-b border-slate-200 py-8">
  <div class="max-w-6xl mx-auto px-4">
    <h1 class="text-2xl md:text-3xl font-bold mb-2">{{ title }}</h1>
    <p class="text-slate-500">Found a bug, missing retailer, or have a feature idea? Let us know.</p>
  </div>
</section>

<section class="py-8">
  <div class="max-w-2xl mx-auto px-4">
    <form id="feedback-form" class="bg-white rounded-xl shadow p-6 space-y-4">
      <div>
        <label class="block text-sm font-medium mb-1">Name (optional)</label>
        <input type="text" name="name" class="w-full rounded-lg border border-slate-300 px-3 py-2" placeholder="Your name">
      </div>

      <div>
        <label class="block text-sm font-medium mb-1">Email (optional)</label>
        <input type="email" name="email" class="w-full rounded-lg border border-slate-300 px-3 py-2" placeholder="you@example.com">
      </div>

      <div>
        <label class="block text-sm font-medium mb-1">Message *</label>
        <textarea name="message" rows="5" required maxlength="5000" class="w-full rounded-lg border border-slate-300 px-3 py-2" placeholder="Describe the issue or suggestion..."></textarea>
      </div>

      <input type="hidden" name="page_url" value="{{ page_url }}">

      <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg px-4 py-2">
        Send feedback
      </button>

      <p id="feedback-message" class="text-sm"></p>
    </form>
  </div>
</section>

<script>
async function submitFeedback(event) {
  event.preventDefault();
  const form = event.target;
  const data = Object.fromEntries(new FormData(form));
  const messageEl = document.getElementById('feedback-message');
  messageEl.textContent = 'Sending...';
  messageEl.className = 'text-sm text-slate-500';

  try {
    const res = await fetch('/api/feedback', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Accept': 'application/json',
      },
      body: JSON.stringify(data)
    });
    const json = await res.json();
    if (res.ok) {
      messageEl.textContent = json.message;
      messageEl.className = 'text-sm text-green-600';
      form.reset();
    } else {
      messageEl.textContent = json.detail || 'Something went wrong. Please try again.';
      messageEl.className = 'text-sm text-red-600';
    }
  } catch (err) {
    messageEl.textContent = 'Network error. Please check your connection and try again.';
    messageEl.className = 'text-sm text-red-600';
  }
}

document.getElementById('feedback-form').addEventListener('submit', submitFeedback);
</script>
{% endblock %}
