services:
  - type: web
    name: klimaradar
    runtime: docker
    repo: https://github.com/wlq135/klimaradar
    plan: starter
    envVars:
      - key: DATABASE_URL
        value: sqlite+aiosqlite:////data/klimaradar.db
      - key: BASE_URL
        value: https://klima-radar.com
      - key: DEBUG
        value: "false"
      - key: SENDGRID_API_KEY
        sync: false
      - key: FROM_EMAIL
        value: alerts@klima-radar.com
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: ADMIN_API_KEY
        sync: false
      - key: ENABLE_DEMO
        value: "false"
      - key: AMAZON_DE_AFFILIATE_TAG
        sync: false
      - key: AMAZON_FR_AFFILIATE_TAG
        sync: false
      - key: MEDIAMARKT_DE_AFFILIATE_TAG
        sync: false
      - key: BOULANGER_FR_AFFILIATE_TAG
        sync: false
      - key: DARTY_FR_AFFILIATE_TAG
        sync: false
      - key: PLAYWRIGHT_PROXY_SERVER
        sync: false
      - key: PLAYWRIGHT_PROXY_USERNAME
        sync: false
      - key: PLAYWRIGHT_PROXY_PASSWORD
        sync: false
    healthCheckPath: /api/health
    disk:
      name: klimaradar-data
      mountPath: /data
      sizeGB: 1
